name: elixir-nif-release

on:
  workflow_dispatch:
  push:
    tags:
      - "elixir-v*"

permissions:
  contents: write
  id-token: write
  attestations: write

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: "0"

jobs:
  build:
    name: NIF ${{ matrix.nif }} - ${{ matrix.job.target }}
    runs-on: ${{ matrix.job.os }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        nif: ["2.15"]
        job:
          - { target: aarch64-apple-darwin, os: macos-15 }
          - { target: x86_64-apple-darwin, os: macos-15-intel }
          - { target: aarch64-unknown-linux-gnu, os: ubuntu-22.04, use-cross: true }
          - { target: x86_64-unknown-linux-gnu, os: ubuntu-22.04 }
          - { target: aarch64-unknown-linux-musl, os: ubuntu-22.04, use-cross: true }
          - { target: x86_64-unknown-linux-musl, os: ubuntu-22.04, use-cross: true }
          - { target: x86_64-pc-windows-msvc, os: windows-2022 }
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Extract package version
        shell: bash
        run: echo "PROJECT_VERSION=$(sed -n 's/^  @version \"\\(.*\\)\"/\\1/p' mix.exs | head -n1)" >> "$GITHUB_ENV"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          target: ${{ matrix.job.target }}

      - name: Install Linux build dependencies
        if: startsWith(matrix.job.os, 'ubuntu')
        run: sudo apt-get update && sudo apt-get install -y cmake

      - name: Build precompiled NIF
        id: build-crate
        uses: philss/rustler-precompiled-action@v1.1.5
        with:
          project-name: aube_nif
          project-version: ${{ env.PROJECT_VERSION }}
          target: ${{ matrix.job.target }}
          nif-version: ${{ matrix.nif }}
          use-cross: ${{ matrix.job.use-cross == true }}
          project-dir: "native/aube_nif"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: ${{ steps.build-crate.outputs.file-name }}
          path: ${{ steps.build-crate.outputs.file-path }}

      - name: Attach artifact to GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "$GITHUB_REF_NAME" "${{ steps.build-crate.outputs.file-path }}" --clobber

      - name: Attest NIF artifact
        if: startsWith(github.ref, 'refs/tags/')
        uses: actions/attest-build-provenance@977bb373ede98d70efdf65b84cb5f73e068dcc2a # v3
        with:
          subject-path: ${{ steps.build-crate.outputs.file-path }}

  checksum:
    name: Generate checksum helper output
    runs-on: ubuntu-22.04
    timeout-minutes: 20
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Set up Erlang and Elixir
        uses: erlef/setup-beam@v1
        with:
          otp-version: "27"
          elixir-version: "1.18"

      - name: Fetch Mix dependencies
        run: mix deps.get

      - name: Print checksum file contents
        run: mix rustler_precompiled.download Aube.Native --all --print
